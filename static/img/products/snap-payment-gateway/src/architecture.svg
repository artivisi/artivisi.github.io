  <rect x="410" y="182" width="160" height="22" rx="4" fill="#eff6ff"/>
  <text x="490" y="197" text-anchor="middle" fill="#2563eb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600">Unified REST API</text>

