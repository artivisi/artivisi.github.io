  <rect x="40" y="252" width="900" height="20" fill="#2563eb"/>
  <text x="490" y="256" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">ARTIVISI PAYMENT GATEWAY</text>

  <!-- Core Services label -->
  <text x="70" y="298" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5">CORE SERVICES</text>
  <line x1="70" y1="303" x2="180" y2="303" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Payment API -->
  <rect x="70" y="312" width="240" height="58" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="190" y="338" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Payment API</text>
  <text x="190" y="358" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">create | inquiry | cancel | status</text>

  <!-- Notification Handler -->
  <rect x="330" y="312" width="240" height="58" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Notification Handler</text>
  <text x="450" y="358" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">bank callback processing</text>

  <!-- Reconciliation Engine -->
  <rect x="590" y="312" width="240" height="58" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="710" y="338" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Reconciliation Engine</text>
  <text x="710" y="358" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">matching | reports | settlement</text>

  <!-- Arrows from core services down -->
  <line x1="190" y1="370" x2="190" y2="405" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="450" y1="370" x2="450" y2="405" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="710" y1="370" x2="710" y2="405" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>

