<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1095 1005">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-blue-up" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto-start-reverse" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="blue-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="blue-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1095" height="1005" rx="12" fill="url(#bg-grad)"/>
  <rect width="1095" height="1005" rx="12" fill="url(#grid)" opacity="0.4"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1095" height="56" rx="12" fill="url(#blue-header)"/>
  <rect x="0" y="20" width="1095" height="36" fill="url(#blue-header)"/>
  <text x="547" y="36" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1">PAYMENT GATEWAY — SYSTEM ARCHITECTURE</text>

  <!-- ============ CLIENT LAYER ============ -->
  <text x="60" y="92" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2">CLIENT LAYER</text>
  <line x1="60" y1="98" x2="200" y2="98" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Client App boxes -->
  <g filter="url(#shadow-sm)">
    <rect x="120" y="110" width="220" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="230" y="138" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">University SIS</text>
    <text x="230" y="156" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Student Information System</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="380" y="110" width="220" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="490" y="138" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Hospital HIS</text>
    <text x="490" y="156" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Health Information System</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="640" y="110" width="220" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="750" y="138" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">ERP System</text>
    <text x="750" y="156" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Enterprise Application</text>
  </g>

