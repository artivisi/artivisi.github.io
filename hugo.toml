baseURL = 'https://artivisi.com/'
languageCode = 'id'
defaultContentLanguage = 'id'
title = 'ArtiVisi Intermedia'

[pagination]
  pagerSize = 9

[params]
  description = 'Spesialis sistem pembayaran dan infrastruktur keuangan. ISO 8583, SNAP API, payment gateway, HSM, dan integrasi bank di Indonesia.'
  keywords = ['sistem pembayaran', 'ISO 8583', 'SNAP API', 'payment gateway', 'HSM', 'disbursement', 'integrasi bank', 'BI-FAST', 'QRIS', 'payment switch']
  author = 'ArtiVisi Intermedia'

  [params.branding]
    primaryColor = "#2563eb"    # Navy blue from logo
    accentColor = "#22c55e"     # Green from logo

  [params.social]
    youtube = 'https://www.youtube.com/@artivisi'
    instagram = 'https://www.instagram.com/artivisiintermedia/'
    facebook = 'https://www.facebook.com/artivisiintermediajakarta'
    linkedin = 'https://www.linkedin.com/company/artivisi-intermedia'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = 'Product'
    url = '/products/'
    weight = 1
  [[menu.main]]
    identifier = 'training'
    name = 'Training'
    url = '#'
    weight = 2
  [[menu.main]]
    name = 'Katalog Program'
    url = '/training-catalog/'
    parent = 'training'
    weight = 1
  [[menu.main]]
    name = 'Portfolio Pelatihan'
    url = '/training/'
    parent = 'training'
    weight = 2
  [[menu.main]]
    name = 'Consulting'
    url = '/consulting/'
    weight = 3
  [[menu.main]]
    name = 'Project'
    url = '/projects/'
    weight = 4
  [[menu.main]]
    name = 'About Us'
    url = '/about_us/'
    weight = 5

  [[menu.footer]]
    name = 'Internship'
    url = '/content/karir/magang/'
    weight = 1

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[sitemap]
  changefreq = 'monthly'
  filename = 'sitemap.xml'
  priority = 0.5
