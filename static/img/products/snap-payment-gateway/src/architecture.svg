  <text x="70" y="492" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5">BANK ADAPTERS</text>
  <line x1="70" y1="497" x2="175" y2="497" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="70" y="506" width="170" height="48" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="155" y="535" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">BCA Adapter</text>

  <rect x="260" y="506" width="170" height="48" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="345" y="535" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">BNI Adapter</text>

  <rect x="450" y="506" width="170" height="48" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="535" y="535" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">Mandiri Adapter</text>

  <rect x="640" y="506" width="170" height="48" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1"/>
  <text x="725" y="535" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">BRI Adapter</text>

  <!-- Operations sidebar -->
  <text x="850" y="298" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1">OPS</text>

  <rect x="848" y="312" width="80" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="888" y="333" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">Admin</text>
  <text x="888" y="349" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">Dashboard</text>

  <rect x="848" y="370" width="80" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="888" y="391" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">Audit Log</text>
  <text x="888" y="407" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">&amp; Monitoring</text>

  <!-- Security footer bar -->
  <rect x="70" y="575" width="860" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="594" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Security: mTLS certificate management · API key rotation · IP whitelisting · Request signing · Encryption at rest</text>

  <!-- Bottom line inside container -->
  <rect x="70" y="618" width="860" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="638" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Tech: Java 25 · Spring Boot 4.0 · PostgreSQL 17 · jPOS · Docker / Kubernetes</text>

  <!-- ============ ARROWS FROM GATEWAY TO BANKS ============ -->
  <line x1="155" y1="708" x2="155" y2="748" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="370" y1="708" x2="370" y2="748" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="585" y1="708" x2="585" y2="748" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="800" y1="708" x2="800" y2="748" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- SNAP API labels on arrows -->
  <text x="155" y="733" text-anchor="middle" fill="#2563eb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600">SNAP API</text>
  <text x="370" y="733" text-anchor="middle" fill="#2563eb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600">SNAP API</text>
  <text x="585" y="733" text-anchor="middle" fill="#2563eb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600">SNAP API</text>
  <text x="800" y="733" text-anchor="middle" fill="#2563eb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600">SNAP API</text>

  <!-- ============ BANK LAYER ============ -->
  <text x="60" y="770" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2">BANK PARTNERS</text>
  <line x1="60" y1="776" x2="200" y2="776" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Banks -->
  <g filter="url(#shadow-sm)">
    <rect x="70" y="790" width="170" height="56" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
    <text x="155" y="816" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">BCA</text>
    <text x="155" y="835" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Virtual Account</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="280" y="790" width="170" height="56" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
    <text x="365" y="816" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">BNI</text>
    <text x="365" y="835" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Virtual Account · QRIS</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="490" y="790" width="170" height="56" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
    <text x="575" y="816" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">BRI</text>
    <text x="575" y="835" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Virtual Account</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="700" y="790" width="170" height="56" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
    <text x="785" y="816" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700">BSI</text>
    <text x="785" y="835" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Virtual Account</text>
  </g>

  <!-- Coming badge -->
  <rect x="420" y="880" width="255" height="38" rx="19" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="547" y="904" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5">COMING Q3 2026</text>

  <!-- Bottom accent line -->
  <rect x="0" y="940" width="1095" height="4" fill="#2563eb" opacity="0.3"/>

  <!-- Footer -->
  <text x="547" y="975" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">artivisi.com · On-premise payment gateway with unified multi-bank integration via SNAP API</text>
</svg>