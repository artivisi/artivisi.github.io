<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 790">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#2563eb"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#e11d48"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <filter id="sh-lg">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="790" fill="#f8fafc" rx="8"/>

  <!-- ==================== ROW 0: Balaka (GL) + Tawqi ==================== -->

  <!-- Balaka -->
  <rect x="60" y="30" width="250" height="115" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="60" y="30" width="250" height="28" rx="10" fill="#f59e0b"/>
  <rect x="60" y="44" width="250" height="14" fill="#f59e0b"/>
  <text x="185" y="49" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">Balaka — Aplikasi Akunting</text>
  <text x="185" y="72" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#d97706" font-weight="600">BUKU BESAR — BOOK OF RECORD</text>
  <text x="76" y="90" font-family="sans-serif" font-size="9" fill="#475569">Jurnal &amp; Buku Besar</text>
  <text x="76" y="104" font-family="sans-serif" font-size="9" fill="#475569">Laporan Keuangan</text>
  <text x="76" y="118" font-family="sans-serif" font-size="9" fill="#475569">Pajak, Payroll, Inventori</text>
  <text x="76" y="132" font-family="sans-serif" font-size="9" fill="#475569">Rekonsiliasi Bank, Faktur</text>

  <!-- Tawqi -->
  <rect x="650" y="30" width="250" height="115" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="650" y="30" width="250" height="28" rx="10" fill="#7c3aed"/>
  <rect x="650" y="44" width="250" height="14" fill="#7c3aed"/>
  <text x="775" y="49" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">Tawqi</text>
  <text x="775" y="72" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#7c3aed" font-weight="600">TANDA TANGAN DIGITAL</text>
  <text x="666" y="90" font-family="sans-serif" font-size="9" fill="#475569">PDF Signing (PAdES-B-B)</text>
  <text x="666" y="104" font-family="sans-serif" font-size="9" fill="#475569">Multi-Signer Workflow</text>
  <text x="666" y="118" font-family="sans-serif" font-size="9" fill="#475569">Batch Signing</text>
  <text x="666" y="132" font-family="sans-serif" font-size="9" fill="#475569">PKI via HashiCorp Vault</text>

  <!-- ==================== CLIENT TIER: Sawala + generic client / source systems ==================== -->

  <!-- Sawala -->
  <rect x="100" y="200" width="230" height="60" rx="10" fill="#fff" stroke="#0d9488" stroke-width="1.5" filter="url(#sh-lg)"/>
  <rect x="100" y="200" width="230" height="24" rx="10" fill="#0d9488"/>
  <rect x="100" y="212" width="230" height="12" fill="#0d9488"/>
  <text x="215" y="217" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">Sawala</text>
  <text x="215" y="238" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#0d9488" font-weight="600">APLIKASI SEKOLAH ISLAM</text>
  <text x="215" y="252" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#475569">SDIT/SMPIT — Akademik, Hafalan, SPP</text>

  <!-- Generic client / source systems -->
  <rect x="430" y="200" width="330" height="60" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#sh-lg)"/>
  <text x="595" y="225" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">APLIKASI KLIEN / SISTEM SUMBER</text>
  <text x="595" y="243" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">SIS Universitas / HIS Rumah Sakit / ERP /</text>
  <text x="595" y="254" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#94a3b8">Registrasi / Aplikasi Yayasan</text>

  <!-- ==================== Arrows: client tier -> Balaka / Tawqi ==================== -->
  <!-- Sawala -> Balaka (journals) -->
  <line x1="160" y1="200" x2="160" y2="145" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="168" y="178" font-family="sans-serif" font-size="8" fill="#d97706" font-weight="600">jurnal</text>

  <!-- Client -> Balaka (Accounting API) -->
  <path d="M 480,200 C 480,165 310,180 285,145" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arr-amber)"/>
  <text x="360" y="172" font-family="sans-serif" font-size="8" fill="#d97706" font-weight="600">Accounting API</text>

  <!-- Client -> Tawqi (Signing API) -->
  <path d="M 700,200 C 700,165 775,180 775,145" stroke="#7c3aed" stroke-width="1.5" fill="none" marker-end="url(#arr-purple)"/>
  <text x="722" y="172" font-family="sans-serif" font-size="8" fill="#7c3aed" font-weight="600">Signing API</text>

  <!-- ==================== ROW: Account Receivable (subledger) ==================== -->
  <rect x="100" y="310" width="330" height="100" rx="10" fill="#fff" stroke="#e11d48" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="100" y="310" width="330" height="26" rx="10" fill="#e11d48"/>
  <rect x="100" y="323" width="330" height="13" fill="#e11d48"/>
  <text x="265" y="328" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">Account Receivable</text>
  <text x="265" y="350" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e11d48" font-weight="600">SUBLEDGER PIUTANG — SIAPA BERUTANG APA</text>
  <text x="116" y="368" font-family="sans-serif" font-size="9" fill="#475569">Debitur, Invoice &amp; Line Items</text>
  <text x="116" y="382" font-family="sans-serif" font-size="9" fill="#475569">Jadwal Cicilan, Aging, Dunning</text>
  <text x="116" y="396" font-family="sans-serif" font-size="9" fill="#475569">Cash Application</text>
  <text x="280" y="368" font-family="sans-serif" font-size="9" fill="#475569">Posting Jurnal ke GL</text>
  <text x="280" y="382" font-family="sans-serif" font-size="9" fill="#475569">Statement &amp; Laporan Umur</text>
  <text x="280" y="396" font-family="sans-serif" font-size="9" fill="#475569">Rekonsiliasi Subledger–GL</text>

  <!-- Client -> AR (raise receivable) -->
  <path d="M 500,260 C 500,295 350,285 350,310" stroke="#e11d48" stroke-width="1.5" fill="none" marker-end="url(#arr-rose)"/>
  <text x="392" y="290" font-family="sans-serif" font-size="8" fill="#e11d48" font-weight="600">terbitkan piutang</text>

  <!-- AR -> Balaka (post journals), through the gap between Sawala and client box -->
  <path d="M 395,310 C 395,240 240,220 240,145" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arr-amber)"/>
  <text x="330" y="232" font-family="sans-serif" font-size="8" fill="#d97706" font-weight="600">posting jurnal</text>

  <!-- Sawala -> Gateway (SPP charge, direct consumer) along left edge -->
  <path d="M 115,260 C 45,290 45,410 90,470" stroke="#0d9488" stroke-width="1.5" fill="none" marker-end="url(#arr-teal)"/>
  <text x="48" y="378" font-family="sans-serif" font-size="8" fill="#0d9488" font-weight="600" transform="rotate(-90 48 378)">VA SPP</text>

  <!-- AR <-> Gateway -->
  <line x1="160" y1="410" x2="160" y2="470" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="168" y="438" font-family="sans-serif" font-size="8" fill="#2563eb" font-weight="600">buka charge + VA</text>
  <line x1="272" y1="470" x2="272" y2="415" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="280" y="432" font-family="sans-serif" font-size="8" fill="#2563eb" font-weight="600">webhook pembayaran</text>

  <!-- Client -> Gateway direct (dashed: modular, no subledger needed) -->
  <path d="M 560,260 C 560,340 470,350 470,410 C 470,445 320,440 300,470" stroke="#2563eb" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="480" y="378" font-family="sans-serif" font-size="8" fill="#2563eb" font-weight="600">atau langsung via Consumer API</text>

  <!-- Client -> Disbursement -->
  <path d="M 700,260 C 700,330 775,390 775,470" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="728" y="368" font-family="sans-serif" font-size="8" fill="#16a34a" font-weight="600">Disbursement API</text>

  <!-- ==================== ROW: Payment Gateway + Disbursement ==================== -->

  <!-- Payment Gateway -->
  <rect x="60" y="470" width="250" height="115" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="60" y="470" width="250" height="28" rx="10" fill="#2563eb"/>
  <rect x="60" y="484" width="250" height="14" fill="#2563eb"/>
  <text x="185" y="489" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">Payment Gateway</text>
  <text x="185" y="512" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2563eb" font-weight="600">UANG MASUK — VIRTUAL ACCOUNT</text>
  <text x="76" y="530" font-family="sans-serif" font-size="9" fill="#475569">VA Multi-Bank (1 tagihan → N VA)</text>
  <text x="76" y="544" font-family="sans-serif" font-size="9" fill="#475569">Open · Closed · Installment</text>
  <text x="76" y="558" font-family="sans-serif" font-size="9" fill="#475569">Rekonsiliasi Settlement</text>
  <text x="76" y="572" font-family="sans-serif" font-size="9" fill="#475569">Webhook ke Aplikasi Consumer</text>

  <!-- Disbursement Platform -->
  <rect x="650" y="470" width="250" height="115" rx="10" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="650" y="470" width="250" height="28" rx="10" fill="#16a34a"/>
  <rect x="650" y="484" width="250" height="14" fill="#16a34a"/>
  <text x="775" y="489" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff">Disbursement Platform</text>
  <text x="775" y="512" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#16a34a" font-weight="600">UANG KELUAR</text>
  <text x="666" y="530" font-family="sans-serif" font-size="9" fill="#475569">Batch Transfer</text>
  <text x="666" y="544" font-family="sans-serif" font-size="9" fill="#475569">Maker-Checker Approval</text>
  <text x="666" y="558" font-family="sans-serif" font-size="9" fill="#475569">Retry &amp; Partial Failure</text>
  <text x="666" y="572" font-family="sans-serif" font-size="9" fill="#475569">Execution Engine</text>

  <!-- ==================== Multi-protocol adapter layer ==================== -->
  <rect x="60" y="620" width="840" height="30" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="640" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#475569">Adapter Multi-Protokol per Bank — SNAP (OAuth 2.0 + Signature) · REST/JSON Proprietary · SOAP/XML</text>

  <!-- Arrows: Gateway / Disbursement -> adapter layer -->
  <line x1="185" y1="585" x2="185" y2="620" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="775" y1="585" x2="775" y2="620" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- ==================== Banks + SP Simulator ==================== -->
  <rect x="60" y="680" width="85" height="28" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="102" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e293b">Maybank</text>

  <rect x="160" y="680" width="85" height="28" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="202" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e293b">BSI</text>

  <rect x="260" y="680" width="85" height="28" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="302" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e293b">CIMB</text>

  <rect x="360" y="680" width="85" height="28" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="402" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e293b">BCA</text>

  <rect x="460" y="680" width="85" height="28" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="502" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e293b">Mandiri</text>

  <rect x="560" y="680" width="85" height="28" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="602" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1e293b">BNI</text>

  <!-- SP Simulator (dashed border) -->
  <rect x="680" y="680" width="220" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="5,3" filter="url(#sh)"/>
  <text x="790" y="698" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#2563eb">SNAP Provider Simulator (dev/test)</text>

  <!-- Arrows: adapter layer -> banks -->
  <line x1="102" y1="650" x2="102" y2="680" stroke="#475569" stroke-width="1" marker-end="url(#arr-slate)"/>
  <line x1="202" y1="650" x2="202" y2="680" stroke="#475569" stroke-width="1" marker-end="url(#arr-slate)"/>
  <line x1="302" y1="650" x2="302" y2="680" stroke="#475569" stroke-width="1" marker-end="url(#arr-slate)"/>
  <line x1="402" y1="650" x2="402" y2="680" stroke="#475569" stroke-width="1" marker-end="url(#arr-slate)"/>
  <line x1="502" y1="650" x2="502" y2="680" stroke="#475569" stroke-width="1" marker-end="url(#arr-slate)"/>
  <line x1="602" y1="650" x2="602" y2="680" stroke="#475569" stroke-width="1" marker-end="url(#arr-slate)"/>
  <line x1="790" y1="650" x2="790" y2="680" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>

  <!-- ==================== Footer ==================== -->
  <text x="480" y="742" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#475569">Modular — tiap produk berjalan mandiri dengan API-nya sendiri; deploy lengkap sebagai satu ekosistem, atau sebagian sesuai kebutuhan</text>
  <text x="480" y="762" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">Semua produk open source (Apache 2.0) — berjalan on-premise di infrastruktur klien</text>
</svg>
