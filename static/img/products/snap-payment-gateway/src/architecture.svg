  <text x="70" y="400" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5">SNAP API CLIENT LAYER</text>
  <line x1="70" y1="405" x2="250" y2="405" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="70" y="414" width="760" height="40" rx="6" fill="url(#blue-accent)" stroke="#93c5fd" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">SNAP Standard — OAuth 2.0 + mTLS + Request Signing</text>

  <!-- Arrows down to adapters -->
  <line x1="170" y1="454" x2="170" y2="478" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="340" y1="454" x2="340" y2="478" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="510" y1="454" x2="510" y2="478" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="680" y1="454" x2="680" y2="478" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4,3"/>

