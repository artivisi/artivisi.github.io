<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1095 1005">
  <defs>
    <marker id="arrow-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e11d48"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="rose-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="rose-accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4e6"/>
      <stop offset="100%" stop-color="#fecdd3"/>
    </linearGradient>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-md">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1095" height="1005" rx="12" fill="url(#bg-grad)"/>
  <rect width="1095" height="1005" rx="12" fill="url(#grid)" opacity="0.4"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1095" height="56" rx="12" fill="url(#rose-header)"/>
  <rect x="0" y="20" width="1095" height="36" fill="url(#rose-header)"/>
  <text x="547" y="36" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1">ACCOUNT RECEIVABLE — SUBLEDGER PIUTANG</text>

  <!-- ============ SOURCE SYSTEMS ============ -->
  <text x="60" y="92" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2">SISTEM SUMBER</text>
  <line x1="60" y1="98" x2="200" y2="98" stroke="#cbd5e1" stroke-width="1"/>

  <g filter="url(#shadow-sm)">
    <rect x="120" y="110" width="220" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="230" y="138" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Akademik / Registrasi</text>
    <text x="230" y="156" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">SPP, uang gedung, ujian</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="380" y="110" width="220" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="490" y="138" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Penjualan / ERP</text>
    <text x="490" y="156" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">invoice pelanggan</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="640" y="110" width="220" height="60" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="750" y="138" text-anchor="middle" fill="#1e293b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Aplikasi Yayasan / RS</text>
    <text x="750" y="156" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">iuran, tagihan pasien</text>
  </g>

  <!-- Arrow down -->
  <line x1="490" y1="170" x2="490" y2="226" stroke="#e11d48" stroke-width="2" marker-end="url(#arrow-rose)"/>
  <rect x="395" y="182" width="190" height="22" rx="4" fill="#fff1f2"/>
  <text x="490" y="197" text-anchor="middle" fill="#e11d48" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600">terbitkan piutang</text>

  <!-- ============ AR CONTAINER ============ -->
  <rect x="40" y="228" width="900" height="410" rx="10" fill="white" stroke="#e11d48" stroke-width="2" filter="url(#shadow-md)"/>
  <rect x="40" y="228" width="900" height="44" rx="10" fill="#e11d48"/>
  <rect x="40" y="252" width="900" height="20" fill="#e11d48"/>
  <text x="490" y="256" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="0.5">ARTIVISI ACCOUNT RECEIVABLE</text>

  <!-- Modules row 1 -->
  <text x="70" y="298" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1.5">RECEIVABLES CORE</text>
  <line x1="70" y1="303" x2="190" y2="303" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="70" y="312" width="240" height="58" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="190" y="338" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Debitur &amp; Invoice</text>
  <text x="190" y="358" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">line items · tipe · nominal immutable</text>

  <rect x="330" y="312" width="240" height="58" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Jadwal Cicilan</text>
  <text x="450" y="358" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">installment · jatuh tempo per termin</text>

  <rect x="590" y="312" width="240" height="58" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="710" y="338" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Lifecycle &amp; Aging</text>
  <text x="710" y="358" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">open → partial → paid · overdue · write-off</text>

  <!-- Modules row 2 -->
  <rect x="70" y="390" width="240" height="58" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="190" y="416" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Dunning &amp; Statement</text>
  <text x="190" y="436" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">penagihan berjenjang · laporan umur</text>

  <rect x="330" y="390" width="240" height="58" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="450" y="416" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Cash Application</text>
  <text x="450" y="436" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">idempoten pada referensi pembayaran</text>

  <rect x="590" y="390" width="240" height="58" rx="6" fill="#fff1f2" stroke="#fecdd3" stroke-width="1"/>
  <text x="710" y="416" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Journal Posting</text>
  <text x="710" y="436" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">double-entry · transactional outbox</text>

  <!-- Ops sidebar -->
  <text x="852" y="298" fill="#64748b" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1">OPS</text>
  <rect x="848" y="312" width="80" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="888" y="333" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">Admin UI</text>
  <text x="888" y="349" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">+ Dashboard</text>
  <rect x="848" y="390" width="80" height="48" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="888" y="411" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">Audit</text>
  <text x="888" y="427" text-anchor="middle" fill="#475569" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" font-weight="600">Log</text>

  <!-- Reconciliation bar -->
  <rect x="70" y="470" width="760" height="40" rx="6" fill="url(#rose-accent)" stroke="#fda4af" stroke-width="1"/>
  <text x="450" y="495" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">Rekonsiliasi 2 lapis — pembayaran gateway ↔ piutang · subledger ↔ akun kontrol GL</text>

  <!-- Principles + tech bars -->
  <rect x="70" y="545" width="860" height="30" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="564" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Prinsip: uang tidak pernah hilang (outbox + retry) · nominal terbit immutable — koreksi via credit note · jurnal selalu balance · fail-loud, tanpa fallback</text>

  <rect x="70" y="588" width="860" height="30" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="608" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">Tech: Java 25 · Spring Boot 4 · PostgreSQL 18 · Flyway · Thymeleaf + HTMX · Docker</text>

  <!-- ============ ARROWS TO SIBLINGS ============ -->
  <line x1="280" y1="638" x2="280" y2="786" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="288" y="715" fill="#2563eb" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600">buka charge · webhook pembayaran</text>

  <line x1="700" y1="638" x2="700" y2="786" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="708" y="715" fill="#d97706" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600">posting jurnal double-entry</text>

  <g filter="url(#shadow-sm)">
    <rect x="120" y="790" width="330" height="56" rx="8" fill="white" stroke="#2563eb" stroke-width="1.5"/>
    <text x="285" y="816" text-anchor="middle" fill="#1e40af" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">Payment Gateway</text>
    <text x="285" y="835" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">VA multi-bank — SNAP · REST/JSON · SOAP/XML</text>
  </g>
  <g filter="url(#shadow-sm)">
    <rect x="540" y="790" width="330" height="56" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="705" y="816" text-anchor="middle" fill="#b45309" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700">General Ledger</text>
    <text x="705" y="835" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10">referensi: Balaka — atau GL/ERP milik klien via API</text>
  </g>

  <!-- Status badge -->
  <rect x="390" y="880" width="315" height="38" rx="19" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="547" y="904" text-anchor="middle" fill="#9f1239" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5">ACTIVE DEVELOPMENT · APACHE 2.0</text>

  <!-- Bottom accent line -->
  <rect x="0" y="940" width="1095" height="4" fill="#e11d48" opacity="0.3"/>

  <!-- Footer -->
  <text x="547" y="975" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">artivisi.com · Subledger piutang — di antara penagihan dan buku besar: siapa berutang apa, tertagih lewat mana, terbuku di mana</text>
</svg>
